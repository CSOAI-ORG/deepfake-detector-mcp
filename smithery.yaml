name: deepfake-detector-mcp
description: AI-powered deepfake detector MCP server for agents. Supports detect deepfake,
  analyze audio authenticity, check image provenance. By MEOK AI Labs.
version: 1.0.0
tools:
- name: detect_deepfake
  description: Analyze image/video metadata and characteristics for manipulation indicators.
  parameters:
  - name: filename
    type: string
    required: true
  - name: file_size_mb
    type: number
    required: true
  - name: metadata
    type: string
    required: false
- name: analyze_audio_authenticity
  description: Check audio for synthesis artifacts and manipulation indicators.
  parameters:
  - name: duration_seconds
    type: number
    required: true
  - name: sample_rate
    type: integer
    required: false
  - name: channels
    type: integer
    required: false
  - name: metadata
    type: string
    required: false
- name: check_image_provenance
  description: Verify image source chain and provenance integrity.
  parameters:
  - name: filename
    type: string
    required: true
  - name: metadata
    type: string
    required: false
  - name: claimed_source
    type: string
    required: false
- name: generate_authenticity_report
  description: Generate a comprehensive authenticity report on content.
  parameters:
  - name: filename
    type: string
    required: true
  - name: file_size_mb
    type: number
    required: true
  - name: media_type
    type: string
    required: false
  - name: metadata
    type: string
    required: false
